name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build Soluna
        id: soluna
        uses: ./soluna/.github/actions/soluna
        with:
          soluna_path: soluna
          debug: 'false'

      - name: Build Miru site
        env:
          SOLUNA_JS_PATH: ${{ steps.soluna.outputs.SOLUNA_JS_PATH }}
          SOLUNA_WASM_PATH: ${{ steps.soluna.outputs.SOLUNA_WASM_PATH }}
        run: node example/scripts/build-site.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy documentation site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
